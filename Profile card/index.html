<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Profile card component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Card Container -->
  <div class="card">
    
    <div class="up">
      <img class="card-bg" src="./assets/images/bg-pattern-card.svg" alt="bg-pattern-card">
    </div>
    
    <div class="center">
      <img src="./assets/images/image-victor.jpg" alt="image-victor" class="profile">
      <h1 class="name">Victor Crest <span>26</span></h1>
      <p class="city">London</p>
    </div>
    
    <div class="down">
      
      <div class="stat">
        <h2>80K</h2>
        <p>Followers</p>
      </div>
      <div class="stat">
        <h2>803K</h2>
        <p>Likes</p>
      </div>
      <div class="stat">
        <h2>1.4K</h2>
        <p>Photos</p>
      </div>
      
    </div>
    
  </div>

  <div class="coder">
    Made with ❤️ by <a href="https://github.com/Satya-Prabhu" target="_blank">Satya Prabhu</a>
  </div>
  
</body>
</html>
