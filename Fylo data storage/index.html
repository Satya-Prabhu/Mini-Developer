<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Fylo data storage component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Parent Container - Outside box area -->
  <div class="container">
    
    <!-- First Container - Logo & Uploads -->
    <div class="first">
      <img src="./assets/images/logo.svg" alt="logo" class="logo">
      <div class="selection">
        <div class="select"><img src="./assets/images/icon-document.svg" alt="icon-document" class="document"></div>
        <div class="select"><img src="./assets/images/icon-folder.svg" alt="icon-folder" class="folder"></div>
        <div class="select"><img src="./assets/images/icon-upload.svg" alt="icon-upload" class="upload"></div>
      </div>
    </div>
    
    <!-- Second Cointainer - Storage Details -->
    <div class="second">
      <p class="brief">You’ve used <span>815 GB</span> of your storage</p>
      <div class="slider-out"><div class="slider-in"><div class="slider-circle"></div></div></div>
      <div class="storage"><span>0 GB</span><span>1000 GB</span></div>
      <div class="storage-left"><span class="stl">185</span> GB Left</div>
      <div class="triangle"></div>
    </div>
    
  </div>

  <div class="coder">
    Made with ❤️ by <a href="https://github.com/Satya-Prabhu" target="_blank">Satya Prabhu</a>
  </div>
  
</body>
</html>
